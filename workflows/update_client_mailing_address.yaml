workflow_id: update_client_mailing_address
name: Update Client Mailing Address
description: Update a client's mailing address in the CRM.
domain: client_servicing
subdomain: profile_maintenance
entities:
  - client
  - address
  - mailing_address
actions:
  - update
qualifiers:
  - mailing
canonical_intents:
  - update:client_address:mailing
trigger_utterances:
  - Update David's mailing address
  - Change a client's mailing address
  - Correct the mailing address for a client
input_fields:
  - name: client_name
    type: string
    required: true
    description: Full client name.
    aliases: [customer_name]
    context_keys: [client_name]
  - name: street_address
    type: string
    required: true
    description: New mailing street address.
    aliases: [address_line_1]
  - name: city
    type: string
    required: true
    description: Mailing city.
  - name: state
    type: string
    required: true
    description: Mailing state or province.
  - name: postal_code
    type: string
    required: true
    description: Mailing postal code.
    aliases: [zip_code]
  - name: effective_date
    type: date
    required: true
    description: Date the change should take effect.

